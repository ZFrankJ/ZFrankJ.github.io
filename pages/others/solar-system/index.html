<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Command - Solar System Explorer</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Load three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 3. Load Google Fonts for a sci-fi feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Custom font families */
        :root {
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        /* Base styles */
        body {
            font-family: var(--font-body);
            background-color: #020818; /* Deep space blue */
            color: #E0EFFF;
            margin: 0;
            overflow: hidden;
        }

        /* Faint stars background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(white 0.5px, transparent 0),
                              radial-gradient(white 0.5px, transparent 0);
            background-size: 40px 40px, 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.1;
            z-index: -1;
        }

        /* Main 3D Canvas */
        #main-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Warp Transition Canvas */
        #warp-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 100;
            display: none;
        }

        /* Heads-Up Display (HUD) Overlay */
        #hud-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1) inset, 0 0 15px rgba(0, 242, 255, 0.1);
            z-index: 10;
            pointer-events: none; /* Make it click-through */
        }
        
        /* HUD Corner Elements */
        .hud-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #00f2ff;
            opacity: 0.7;
        }
        .hud-top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .hud-top-right { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .hud-bottom-left { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .hud-bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; }
        
        /* Glassmorphism UI Panel Style */
        .ui-panel {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1), 0 0 20px rgba(0, 242, 255, 0.1) inset;
        }

        /* Title Screen */
        #title-screen h1 {
            font-family: var(--font-display);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        #start-button {
            font-family: var(--font-display);
            background: #00f2ff;
            color: #020818;
            border: none;
            box-shadow: 0 0 20px #00f2ff, 0 0 30px #00f2ff;
            transition: all 0.3s ease;
        }
        #start-button:hover {
            box-shadow: 0 0 30px #00f2ff, 0 0 45px #00f2ff, 0 0 10px #fff inset;
            transform: scale(1.05);
        }

        /* Info Card */
        #info-card h2 {
            font-family: var(--font-display);
            color: #00f2ff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.7);
        }
        
        /* Custom spinner for texture loading */
        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid #00f2ff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 3D Canvas -->
    <canvas id="main-canvas"></canvas>

    <!-- Warp Transition Canvas -->
    <canvas id="warp-canvas"></canvas>
    
    <!-- Cockpit HUD Overlay -->
    <div id="hud-overlay">
        <div class="hud-corner hud-top-left"></div>
        <div class="hud-corner hud-top-right"></div>
        <div class="hud-corner hud-bottom-left"></div>
        <div class="hud-corner hud-bottom-right"></div>
    </div>

    <!-- Title/Start Screen -->
    <div id="title-screen" class="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-black bg-opacity-80 z-30 text-center p-8">
        <h1 class="text-6xl font-bold mb-4 text-white">STELLAR COMMAND</h1>
        <p class="text-xl mb-8 text-gray-300">Welcome, Captain. The solar system awaits your command.</p>
        <p class="text-xs tracking-wide text-cyan-100/60 mb-8">
            Planetary texture maps from
            <a class="underline hover:text-cyan-200" href="https://www.solarsystemscope.com/textures/" target="_blank" rel="noopener noreferrer">
                Solar System Scope
            </a>
            (CC BY 4.0)
        </p>
        <button id="start-button" class="px-8 py-4 text-lg font-bold rounded-lg transform">
            E N G A G E
        </button>
    </div>

    <!-- Planet Info Card (hidden by default) -->
    <div id="info-card" class="ui-panel absolute top-1/2 md:top-1/4 right-4 md:right-8 w-11/12 md:w-80 p-6 rounded-xl text-left z-20 hidden transform -translate-y-1/2 md:translate-y-0 opacity-0 transition-all duration-500 ease-in-out">
        <h2 id="info-title" class="text-3xl font-bold mb-3"></h2>
        <p id="info-description" class="text-sm mb-4 text-gray-200"></p>
        <ul id="info-facts" class="text-sm space-y-2 text-gray-300">
            <!-- Facts will be populated by JavaScript -->
        </ul>
        <!-- Texture Loading Status -->
        <div id="texture-status" class="mt-4 pt-4 border-t border-cyan-500 border-opacity-30">
            <!-- Status populated by JS -->
        </div>
    </div>

    <!-- Back Button (hidden by default) -->
    <button id="back-button" class="ui-panel absolute top-5 left-5 px-5 py-2 text-white font-semibold rounded-lg hover:bg-opacity-90 transition-all duration-300 z-20 hidden">
        &larr; System View
    </button>
    
    <!-- Global Texture Status -->
    <div id="global-status" class="absolute bottom-5 left-5 z-20 text-sm text-cyan-300 hidden items-center space-x-2">
        <div class="loader"></div>
        <span id="global-status-text">Loading planetary texture maps...</span>
    </div>

    <script type="module">
        // --- Global Variables ---
        let scene, camera, renderer, raycaster, mouse, sunMesh, sunSprite;
        let mainCanvas, warpCanvas, infoCard, backButton, titleScreen, startButton, globalStatus, globalStatusText;
        
        const planets = [];
        const selectableObjects = [];
        const orbitRings = [];
        let currentView = 'system';
        let targetPlanet = null;
        const planetCameraOffset = new THREE.Vector3();
        let texturesLoading = 0;
        let systemCameraHeight = 80;
        const textureLoader = new THREE.TextureLoader();
        const textureBasePath = 'assets/planet-textures/';
        const saturnRingInnerRatio = 1.22;
        const saturnRingOuterRatio = 2.12;

        // --- Planet Data with Local Real Texture Maps ---
        const planetData = {
            mercury: {
                name: "Mercury",
                radius: 0.38,
                distance: 12,
                color: 0xAAAAAA,
                orbitSpeed: 0.004,
                rotationSpeed: 0.001,
                axialTilt: 0.03,
                spinDirection: 1,
                texturePath: `${textureBasePath}mercury.jpg`,
                description: "The smallest planet in our solar system and nearest to the Sun, Mercury is only slightly larger than Earth's Moon.",
                facts: ["Diameter: 4,879 km", "Day Length: 59 Earth days", "Year Length: 88 Earth days"],
                textureStatus: 'pending'
            },
            venus: {
                name: "Venus",
                radius: 0.95,
                distance: 18,
                color: 0xFFE4B5,
                orbitSpeed: 0.002,
                rotationSpeed: 0.0005,
                axialTilt: 177.36,
                spinDirection: -1,
                texturePath: `${textureBasePath}venus.jpg`,
                description: "Venus spins slowly in the opposite direction from most planets. Its thick atmosphere traps heat in a runaway greenhouse effect.",
                facts: ["Diameter: 12,104 km", "Day Length: 243 Earth days", "Year Length: 225 Earth days"],
                textureStatus: 'pending'
            },
            earth: {
                name: "Earth",
                radius: 1,
                distance: 25,
                color: 0x4682B4,
                orbitSpeed: 0.001,
                rotationSpeed: 0.005,
                axialTilt: 23.44,
                spinDirection: 1,
                texturePath: `${textureBasePath}earth.jpg`,
                description: "Our home planet is the only place we know of so far that’s inhabited by living things. It's also the only planet in our solar system with liquid water on the surface.",
                facts: ["Diameter: 12,742 km", "Day Length: 24 hours", "Year Length: 365.25 days"],
                textureStatus: 'pending'
            },
            mars: {
                name: "Mars",
                radius: 0.53,
                distance: 35,
                color: 0xCC6633,
                orbitSpeed: 0.0008,
                rotationSpeed: 0.0048,
                axialTilt: 25.19,
                spinDirection: 1,
                texturePath: `${textureBasePath}mars.jpg`,
                description: "Mars is a dusty, cold, desert world with a very thin atmosphere. There is strong evidence Mars was—billions of years ago—a wetter and warmer planet.",
                facts: ["Diameter: 6,779 km", "Day Length: 24.6 hours", "Year Length: 687 Earth days"],
                textureStatus: 'pending'
            },
            jupiter: {
                name: "Jupiter",
                radius: 4,
                distance: 55,
                color: 0xD2B48C,
                orbitSpeed: 0.0004,
                rotationSpeed: 0.01,
                axialTilt: 3.13,
                spinDirection: 1,
                texturePath: `${textureBasePath}jupiter.jpg`,
                description: "Jupiter is more than twice as massive as all the other planets combined. The giant planet's Great Red Spot is a centuries-old storm bigger than Earth.",
                facts: ["Diameter: 139,820 km", "Day Length: 9.9 Earth hours", "Year Length: 11.9 Earth years"],
                textureStatus: 'pending'
            },
            saturn: {
                name: "Saturn",
                radius: 3.5,
                distance: 80,
                color: 0xF4A460,
                orbitSpeed: 0.0002,
                rotationSpeed: 0.009,
                axialTilt: 26.73,
                spinDirection: 1,
                texturePath: `${textureBasePath}saturn.jpg`,
                ringTexturePath: `${textureBasePath}saturn-ring.png`,
                description: "Adorned with thousands of beautiful ringlets, Saturn is unique. The other giant planets have rings, but none are as spectacular as Saturn's.",
                facts: ["Diameter: 116,460 km", "Day Length: 10.7 Earth hours", "Year Length: 29.5 Earth years"],
                textureStatus: 'pending'
            },
            uranus: {
                name: "Uranus",
                radius: 2.5,
                distance: 110,
                color: 0x7FFFD4,
                orbitSpeed: 0.0001,
                rotationSpeed: 0.007,
                axialTilt: 97.77,
                spinDirection: -1,
                texturePath: `${textureBasePath}uranus.jpg`,
                description: "An ice giant with a unique sideways rotation, giving it extreme seasons that last over 20 years.",
                facts: ["Diameter: 50,724 km", "Day Length: 17.3 Earth hours", "Year Length: 84 Earth years"],
                textureStatus: 'pending'
            },
            neptune: {
                name: "Neptune",
                radius: 2.4,
                distance: 135,
                color: 0x4169E1,
                orbitSpeed: 0.00008,
                rotationSpeed: 0.006,
                axialTilt: 28.32,
                spinDirection: 1,
                texturePath: `${textureBasePath}neptune.jpg`,
                description: "The windiest planet in the solar system, Neptune is a deep blue ice giant farthest from the Sun.",
                facts: ["Diameter: 49,244 km", "Day Length: 16.1 Earth hours", "Year Length: 165 Earth years"],
                textureStatus: 'pending'
            }
        };

        // --- Initialization Function ---
        function init() {
            // 1. Get DOM Elements
            mainCanvas = document.getElementById('main-canvas');
            warpCanvas = document.getElementById('warp-canvas');
            infoCard = document.getElementById('info-card');
            backButton = document.getElementById('back-button');
            titleScreen = document.getElementById('title-screen');
            startButton = document.getElementById('start-button');
            globalStatus = document.getElementById('global-status');
            globalStatusText = document.getElementById('global-status-text');

            // 2. Setup 3D Scene
            scene = new THREE.Scene();

            // 3. Setup Camera
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
            setSystemCamera();

            // 4. Setup Renderer
            renderer = new THREE.WebGLRenderer({ canvas: mainCanvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            if (THREE.sRGBEncoding) {
                renderer.outputEncoding = THREE.sRGBEncoding;
            }
            renderer.setClearColor(0x000000, 0); // Transparent background

            // 5. Setup Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xFFAA45, 3.2, 300);
            scene.add(pointLight);

            // 6. Setup Raycaster
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // 7. Create the Solar System
            createSolarSystem();
            // Set camera height so all orbits stay in view
            const maxDistance = Math.max(...Object.values(planetData).map(p => p.distance));
            systemCameraHeight = maxDistance * 1.6;
            setSystemCamera();

            // 8. Add Event Listeners
            startButton.addEventListener('click', startApp);
            backButton.addEventListener('click', onBackButtonClick);
            document.addEventListener('mousedown', onDocumentMouseDown);
            window.addEventListener('resize', onWindowResize);
        }

        // --- Start the Application ---
        function startApp() {
            titleScreen.style.display = 'none';
            globalStatus.classList.remove('hidden');
            globalStatus.classList.add('flex');
            
            // Start the 3D animation loop
            animate();
            
            // Start loading all planet textures in the background
            planets.forEach(p => {
                texturesLoading++;
                loadPlanetTexture(p.data, p.mesh);
            });
            updateGlobalStatus();
        }

        function setSystemCamera() {
            if (!camera) return;
            camera.position.set(0, systemCameraHeight * 0.74, systemCameraHeight * 0.96);
            camera.lookAt(0, 0, 0);
        }

        // --- Create 3D Solar System ---
        function createSolarSystem() {
            // Create Sun
            const sunGeometry = new THREE.SphereGeometry(5, 96, 64);
            const sunTexture = loadTexture(`${textureBasePath}sun.jpg`);
            const sunMaterial = new THREE.MeshBasicMaterial({
                color: 0xFFFFFF,
                map: sunTexture
            });
            sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sunMesh);

            // Add a lens flare effect to the sun
            const sunGlow = new THREE.SpriteMaterial({
                map: new THREE.CanvasTexture(generateGlowTexture()),
                color: 0xFF8A24,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            sunSprite = new THREE.Sprite(sunGlow);
            sunSprite.scale.set(30, 30, 1.0);
            sunMesh.add(sunSprite);

            // Create Planets
            for (const key in planetData) {
                const data = planetData[key];

                // 1. Planet Geometry
                const geometry = new THREE.SphereGeometry(data.radius, 96, 64);
                
                // 2. Initial Material (Emissive Color)
                // The planet will glow with its base color until the texture loads
                const material = new THREE.MeshStandardMaterial({
                    color: data.color,
                    emissive: data.color,
                    emissiveIntensity: 0.7
                });
                
                const planetMesh = new THREE.Mesh(geometry, material);
                planetMesh.userData = data;
                selectableObjects.push(planetMesh);

                // 3. Orbit Pivot and Tilted Spin Group
                const pivot = new THREE.Object3D();
                const planetAnchor = new THREE.Object3D();
                const axialGroup = new THREE.Object3D();
                planetAnchor.position.set(data.distance, 0, 0);
                axialGroup.rotation.z = THREE.MathUtils.degToRad(data.axialTilt);
                axialGroup.add(planetMesh);
                planetAnchor.add(axialGroup);
                pivot.add(planetAnchor);
                scene.add(pivot);

                // 4. Orbit Path (visual ring)
                const orbitGeometry = new THREE.RingGeometry(data.distance - 0.05, data.distance + 0.05, 128);
                const orbitMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x00f2ff, 
                    side: THREE.DoubleSide, 
                    opacity: 0.15, 
                    transparent: true 
                });
                const orbitRing = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbitRing.rotation.x = Math.PI / 2;
                scene.add(orbitRing);
                orbitRings.push(orbitRing);
                
                // 5. Special case: Saturn's Rings
                if (data.name === "Saturn") {
                    const ringGeometry = new THREE.RingGeometry(data.radius * saturnRingInnerRatio, data.radius * saturnRingOuterRatio, 256, 8);
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        map: loadSaturnRingTexture(data.ringTexturePath),
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.72,
                        alphaTest: 0.08
                    });
                    const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
                    ringMesh.rotation.x = Math.PI / 2; // Ring plane stays perpendicular to Saturn's tilted spin axis.
                    ringMesh.userData = data;
                    selectableObjects.push(ringMesh);
                    axialGroup.add(ringMesh);
                }

                // 6. Store for animation and raycasting
                planets.push({ mesh: planetMesh, pivot: pivot, anchor: planetAnchor, axialGroup: axialGroup, ringMesh: data.name === "Saturn" ? axialGroup.children.find(child => child.userData === data && child !== planetMesh) : null, data: data });
            }
        }
        
        // --- Canvas/Texture Helper Functions ---

        function generateGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            gradient.addColorStop(0.08, 'rgba(255, 225, 170, 0.5)');
            gradient.addColorStop(0.34, 'rgba(255, 142, 32, 0.8)');
            gradient.addColorStop(0.72, 'rgba(230, 78, 20, 0.32)');
            gradient.addColorStop(1.0, 'rgba(150, 32, 8, 0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, canvas.width, canvas.height);
            return canvas;
        }

        // --- Texture Loading ---

        function configureTexture(texture) {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            texture.anisotropy = renderer ? renderer.capabilities.getMaxAnisotropy() : 1;
            if ('encoding' in texture && THREE.sRGBEncoding) {
                texture.encoding = THREE.sRGBEncoding;
            }
            return texture;
        }

        function loadTexture(imageUrl, onLoad, onError) {
            return textureLoader.load(
                imageUrl,
                (texture) => {
                    configureTexture(texture);
                    if (onLoad) onLoad(texture);
                },
                undefined,
                onError
            );
        }

        function loadSaturnRingTexture(imageUrl) {
            const canvas = document.createElement('canvas');
            const size = 768;
            canvas.width = size;
            canvas.height = size;
            const context = canvas.getContext('2d');
            drawFallbackSaturnRing(context, size);

            const texture = new THREE.CanvasTexture(canvas);
            configureTexture(texture);

            const image = new Image();
            image.onload = () => {
                drawAnnularSaturnRing(context, image, size);
                texture.needsUpdate = true;
            };
            image.onerror = (error) => {
                console.error('Error loading Saturn ring texture:', error);
            };
            image.src = imageUrl;

            return texture;
        }

        function drawFallbackSaturnRing(context, size) {
            context.clearRect(0, 0, size, size);
            const center = size / 2;
            const outerRadius = size * 0.5;
            const innerRadius = outerRadius * (saturnRingInnerRatio / saturnRingOuterRatio);

            for (let radius = innerRadius; radius < outerRadius; radius += 1) {
                const t = (radius - innerRadius) / (outerRadius - innerRadius);
                const band = 0.42 + Math.sin(t * Math.PI * 24) * 0.08;
                context.strokeStyle = `rgba(176, 164, 145, ${band})`;
                context.beginPath();
                context.arc(center, center, radius, 0, Math.PI * 2);
                context.stroke();
            }
        }

        function drawAnnularSaturnRing(context, image, size) {
            const stripCanvas = document.createElement('canvas');
            stripCanvas.width = image.width;
            stripCanvas.height = image.height;
            const stripContext = stripCanvas.getContext('2d');
            stripContext.drawImage(image, 0, 0);
            const stripPixels = stripContext.getImageData(0, 0, stripCanvas.width, stripCanvas.height).data;

            const ringPixels = context.createImageData(size, size);
            const output = ringPixels.data;
            const center = size / 2;
            const outerRadius = size * 0.5;
            const innerRadius = outerRadius * (saturnRingInnerRatio / saturnRingOuterRatio);
            const sampleY = Math.floor(stripCanvas.height / 2);

            for (let y = 0; y < size; y++) {
                const dy = y - center;
                for (let x = 0; x < size; x++) {
                    const dx = x - center;
                    const radius = Math.sqrt(dx * dx + dy * dy);
                    const outputIndex = (y * size + x) * 4;

                    if (radius < innerRadius || radius > outerRadius) {
                        output[outputIndex + 3] = 0;
                        continue;
                    }

                    const t = (radius - innerRadius) / (outerRadius - innerRadius);
                    const sampleX = Math.min(stripCanvas.width - 1, Math.max(0, Math.floor(t * (stripCanvas.width - 1))));
                    const sourceIndex = (sampleY * stripCanvas.width + sampleX) * 4;
                    output[outputIndex] = stripPixels[sourceIndex];
                    output[outputIndex + 1] = stripPixels[sourceIndex + 1];
                    output[outputIndex + 2] = stripPixels[sourceIndex + 2];
                    output[outputIndex + 3] = stripPixels[sourceIndex + 3];
                }
            }

            context.putImageData(ringPixels, 0, 0);
        }

        function loadPlanetTexture(planetData, planetMesh) {
            planetData.textureStatus = 'loading';
            loadTexture(
                planetData.texturePath,
                (texture) => {
                    planetMesh.material.map = texture;
                    planetMesh.material.color.set(0xffffff); // Use texture's full color
                    planetMesh.material.emissive.set(0x000000); // Stop glowing
                    planetMesh.material.emissiveIntensity = 0;
                    planetMesh.material.needsUpdate = true;
                    planetData.textureStatus = 'loaded';
                    texturesLoading--;
                    updateGlobalStatus();
                },
                (err) => {
                    console.error(`Error loading texture for ${planetData.name}:`, err);
                    planetData.textureStatus = 'failed';
                    texturesLoading--;
                    updateGlobalStatus();
                }
            );
        }

        function updateGlobalStatus() {
            if (texturesLoading > 0) {
                globalStatusText.textContent = `Loading ${texturesLoading} planetary texture maps...`;
            } else {
                globalStatus.style.display = 'none';
            }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (sunMesh) {
                sunMesh.rotation.y += 0.0012;
            }

            planets.forEach(p => {
                p.pivot.rotation.y += p.data.orbitSpeed;
                p.mesh.rotation.y += p.data.rotationSpeed * p.data.spinDirection;
            });

            if (currentView === 'planet' && targetPlanet) {
                targetPlanet.mesh.rotation.y += 0.005 * targetPlanet.data.spinDirection;
                updatePlanetCamera();
            }

            renderer.render(scene, camera);
        }

        // --- Event Handlers ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            warpCanvas.width = window.innerWidth;
            warpCanvas.height = window.innerHeight;
        }

        function onDocumentMouseDown(event) {
            if (currentView !== 'system') return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(selectableObjects);

            if (intersects.length > 0) {
                const intersectedMesh = intersects[0].object;
                targetPlanet = planets.find(p => p.mesh === intersectedMesh || p.data === intersectedMesh.userData);
                if (targetPlanet) {
                    showPlanetView(targetPlanet);
                }
            }
        }

        function onBackButtonClick() {
            showSolarSystemView();
        }
        
        // --- View Switching Logic ---
        function showPlanetView(planet) {
            currentView = 'planet';
            orbitRings.forEach(ring => ring.visible = false);
            if (sunSprite) {
                sunSprite.visible = false;
            }
            
            startWarp(() => {
                populateInfoCard(planet.data);
                infoCard.classList.remove('hidden');
                setTimeout(() => infoCard.classList.remove('opacity-0'), 10); // Fade in
                
                backButton.classList.remove('hidden');
                
                const targetPos = new THREE.Vector3();
                planet.mesh.getWorldPosition(targetPos);
                
                const cameraOffset = planet.data.radius * 3.5;
                planetCameraOffset.set(0, cameraOffset / 3, cameraOffset);
                updatePlanetCamera();
            });
        }

        function updatePlanetCamera() {
            if (!targetPlanet) return;

            const targetPos = new THREE.Vector3();
            targetPlanet.mesh.getWorldPosition(targetPos);
            camera.position.copy(targetPos).add(planetCameraOffset);
            camera.lookAt(targetPos);
        }

        function showSolarSystemView() {
            currentView = 'system';
            targetPlanet = null;
            orbitRings.forEach(ring => ring.visible = true);
            if (sunSprite) {
                sunSprite.visible = true;
            }

            infoCard.classList.add('opacity-0');
            setTimeout(() => infoCard.classList.add('hidden'), 500); // Wait for fade
            backButton.classList.add('hidden');
            
            startWarp(() => {
                setSystemCamera();
            });
        }

        function populateInfoCard(data) {
            document.getElementById('info-title').textContent = data.name;
            document.getElementById('info-description').textContent = data.description;
            
            const factsList = document.getElementById('info-facts');
            factsList.innerHTML = '';
            data.facts.forEach(fact => {
                const li = document.createElement('li');
                li.textContent = `• ${fact}`;
                factsList.appendChild(li);
            });
            
            // Populate texture status
            const statusEl = document.getElementById('texture-status');
            if (data.textureStatus === 'pending' || data.textureStatus === 'loading') {
                statusEl.style.display = 'block';
                statusEl.innerHTML = `<div class="flex items-center space-x-2 text-cyan-100/70">
                                          <div class="loader"></div>
                                          <span>Loading real surface map...</span>
                                      </div>`;
            } else if (data.textureStatus === 'loaded') {
                statusEl.style.display = 'none';
                statusEl.innerHTML = '';
            } else {
                statusEl.style.display = 'block';
                statusEl.innerHTML = `<span class="text-cyan-100/70">Surface map unavailable. Base material active.</span>`;
            }
        }

        // --- Warp Speed Animation (Unchanged) ---
        let stars = [];
        const warpSpeed = 10;
        const numStars = 800;
        let warpAnimationId;

        function startWarp(onCompleteCallback) {
            warpCanvas.style.display = 'block';
            const ctx = warpCanvas.getContext('2d');
            
            warpCanvas.width = window.innerWidth;
            warpCanvas.height = window.innerHeight;
            
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * warpCanvas.width - warpCanvas.width / 2,
                    y: Math.random() * warpCanvas.height - warpCanvas.height / 2,
                    z: Math.random() * warpCanvas.width,
                    pz: 0
                });
            }
            
            const duration = 1500;
            const startTime = Date.now();

            function animateWarp() {
                const elapsed = Date.now() - startTime;
                
                if (elapsed > duration) {
                    cancelAnimationFrame(warpAnimationId);
                    warpCanvas.style.display = 'none';
                    if (onCompleteCallback) onCompleteCallback();
                    return;
                }

                const currentSpeed = warpSpeed + (elapsed / duration) * 40;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, warpCanvas.width, warpCanvas.height);
                ctx.save();
                ctx.translate(warpCanvas.width / 2, warpCanvas.height / 2);

                for (let star of stars) {
                    star.pz = star.z;
                    star.z -= currentSpeed;

                    if (star.z < 1) {
                        star.z = warpCanvas.width;
                        star.x = Math.random() * warpCanvas.width - warpCanvas.width / 2;
                        star.y = Math.random() * warpCanvas.height - warpCanvas.height / 2;
                        star.pz = star.z;
                    }

                    const sx = (star.x / star.z) * warpCanvas.width;
                    const sy = (star.y / star.z) * warpCanvas.height;
                    const px = (star.x / star.pz) * warpCanvas.width;
                    const py = (star.y / star.pz) * warpCanvas.height;
                    const radius = Math.max(0.1, (1 - star.z / warpCanvas.width) * 2);

                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(px, py);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${1 - star.z / warpCanvas.width})`;
                    ctx.lineWidth = radius;
                    ctx.stroke();
                }

                ctx.restore();
                warpAnimationId = requestAnimationFrame(animateWarp);
            }
            animateWarp();
        }

        // --- Start everything ---
        init();

    </script>
</body>
</html>
